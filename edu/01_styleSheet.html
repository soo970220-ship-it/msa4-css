<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./01.css" />
    <title>Document</title>
    <style>
      h2 {
        color: blue;
      }
    </style>
  </head>
  <body>
    <!-- 인라인 스타일 : HTML요소에 'style속성'을 통해 직접 스타일을 적용; 웬만하면 사용안함-->
    <h1 style="color: blueviolet">안녕 CSS</h1>

    <!-- 내부스타일(인터널스타일) : 'head태그'에 style태그를 사용하여 스타일을 적용 -->
    <h2>내부스타일</h2>

    <!-- 외부스타일: 별도의 css파일을 작성하고,'head태그'에 link태그를 사용해서 스타일을 적용
      보통 타이틀 위에적음, 대부분 외부스타일 적용-->
    <h3>외부스타일</h3>
  </body>
</html>
